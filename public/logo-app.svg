<svg xmlns="http://www.w3.org/2000/svg" viewBox="80 50 370 370" width="512" height="512">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E3A8A" />
      <stop offset="50%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#60A5FA" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C2410C" />
      <stop offset="50%" stop-color="#F97316" />
      <stop offset="100%" stop-color="#FDBA74" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.15" />
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Top Left Orange Swoosh -->
    <path d="M 120 280 A 180 180 0 0 1 340 100" fill="none" stroke="url(#orangeGrad)" stroke-width="40" stroke-linecap="round" />

    <!-- Bottom to Right Blue Swoosh with Arrow -->
    <path d="M 140 350 A 180 180 0 0 0 420 256 A 180 180 0 0 0 380 130" fill="none" stroke="url(#blueGrad)" stroke-width="40" stroke-linecap="round" />
    
    <!-- Arrow Head -->
    <path d="M 390 90 L 330 155 L 430 145 Z" fill="url(#blueGrad)" stroke="url(#blueGrad)" stroke-width="4" stroke-linejoin="round" />

    <!-- Bars -->
    <rect x="180" y="270" width="40" height="90" rx="12" fill="url(#orangeGrad)" />
    <rect x="236" y="210" width="40" height="150" rx="12" fill="url(#orangeGrad)" />
    <rect x="292" y="150" width="40" height="210" rx="12" fill="url(#orangeGrad)" />
  </g>
</svg>
