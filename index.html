<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f2937" />
    <title>Jornada</title>
    <link class="icon-link" rel="icon" type="image/svg+xml" href="/logo-app.svg" />
    <link rel="apple-touch-icon" href="/logo-app.svg" />
    <script id="dark-mode-initial">
      (function() {
        try {
          var isDark = localStorage.getItem('darkMode') !== 'false';
          if (isDark) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root" class="app-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
